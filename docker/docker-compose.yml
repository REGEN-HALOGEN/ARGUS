# ─── ARGUS Docker Infrastructure ──────────────────────────────────
# One-command startup: docker compose up -d

services:
  # ─── Neo4j Graph Database ─────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: argus-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/argus_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p argus_dev_password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - argus-network

  # ─── Qdrant Vector Database ───────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: argus-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus-network

  # ─── Valkey (Redis-compatible) Cache ──────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: argus-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - argus-network

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  qdrant_data:
    driver: local
  valkey_data:
    driver: local

networks:
  argus-network:
    name: argus-network
    driver: bridge
